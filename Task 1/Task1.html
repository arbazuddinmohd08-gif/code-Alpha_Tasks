<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0d0d14;
      --surface:  #14141f;
      --card:     #1c1c2e;
      --accent:   #b57bee;
      --accent2:  #72d4a8;
      --text:     #e8e0f5;
      --muted:    #8880a0;
      --border:   rgba(181,123,238,0.18);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      padding: 56px 24px 32px;
      text-align: center;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 80px; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 20px auto 0;
      border-radius: 2px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e0c8ff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      max-width: 1240px;
      margin: 0 auto 28px;
      padding: 0 24px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filters button {
      padding: 7px 18px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: all 0.25s ease;
    }
    .filters button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .filters button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d14;
      font-weight: 600;
    }

    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: var(--muted);
      fill: none;
      pointer-events: none;
    }
    #search {
      padding: 8px 16px 8px 36px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      width: 200px;
      outline: none;
      transition: border-color 0.25s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    /* ─── COUNT BAR ─── */
    .count-bar {
      max-width: 1240px;
      margin: 0 auto 16px;
      padding: 0 24px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ─── MASONRY GALLERY ─── */
    .gallery {
      columns: 4 220px;
      column-gap: 14px;
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.3s ease;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .gallery-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px var(--accent);
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: filter 0.4s ease;
    }
    .gallery-item:hover img { filter: brightness(0.55) saturate(1.1); }

    /* ─── OVERLAY ─── */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.35s ease;
      padding: 16px;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay .icon {
      width: 40px; height: 40px;
      background: rgba(181,123,238,0.2);
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .overlay .icon svg {
      width: 18px; height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
    }
    .overlay .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
    }
    .overlay .cat-badge {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(13,13,20,0.75);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 8px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }

    /* ─── EMPTY STATE ─── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      display: none;
    }
    .empty svg { width: 48px; height: 48px; margin: 0 auto 16px; display: block; stroke: var(--muted); fill: none; }
    .empty p { font-size: 0.9rem; }

    /* ─── LIGHTBOX ─── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(8,8,14,0.96);
      justify-content: center; align-items: center;
      z-index: 999;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(12px);
    }
    #lightbox.show { display: flex; animation: lbIn 0.25s ease; }
    @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }

    #lb-img-wrap {
      position: relative;
      max-width: 88vw;
      max-height: 72vh;
    }
    #lb-img {
      display: block;
      max-width: 88vw;
      max-height: 72vh;
      border-radius: 12px;
      box-shadow: 0 0 80px rgba(181,123,238,0.2);
      transition: opacity 0.3s ease;
    }
    #lb-img.fade { opacity: 0; }

    .lb-bottom {
      display: flex; align-items: center;
      gap: 24px;
    }
    .lb-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(181,123,238,0.08);
      color: var(--accent);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .lb-btn:hover {
      background: var(--accent);
      color: #0d0d14;
      border-color: var(--accent);
      transform: scale(1.1);
    }
    .lb-meta {
      text-align: center;
      min-width: 120px;
    }
    #lb-caption {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--text);
      display: block;
    }
    #lb-counter {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 2px;
      display: block;
    }

    #lb-close {
      position: fixed; top: 20px; right: 24px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
    }
    #lb-close:hover {
      background: rgba(255,255,255,0.14);
      transform: rotate(90deg);
    }

    /* Progress strip */
    #lb-progress {
      display: flex; gap: 5px;
      align-items: center;
    }
    .lb-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .lb-dot.cur {
      background: var(--accent);
      transform: scale(1.4);
    }

    /* Swipe hint */
    #lb-hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .toolbar { flex-direction: column; align-items: flex-start; }
      #search { width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Image Gallery</h1>
    <p>Explore curated collections by category</p>
  </header>

  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="active" data-cat="all">All</button>
      <button data-cat="nature">Nature</button>
      <button data-cat="city">City</button>
      <button data-cat="people">People</button>
      <button data-cat="abstract">Abstract</button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Search…" autocomplete="off"/>
    </div>
  </div>

  <div class="count-bar" id="countBar"></div>

  <div class="gallery" id="gallery"></div>
  <div class="empty" id="empty">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
    <p>No images match your search.</p>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lb-close" title="Close (Esc)">&#x2715;</button>
    <img id="lb-img" src="" alt="" />
    <div id="lb-progress"></div>
    <div class="lb-bottom">
      <button class="lb-btn" id="lb-prev" title="Previous (←)">&#8592;</button>
      <div class="lb-meta">
        <span id="lb-caption"></span>
        <span id="lb-counter"></span>
      </div>
      <button class="lb-btn" id="lb-next" title="Next (→)">&#8594;</button>
    </div>
    <span id="lb-hint">Arrow keys to navigate &nbsp;·&nbsp; Esc to close</span>
  </div>

<script>
  const data = [
    { seed: 10,  cat: "nature",   label: "Forest Mist",    h: 280 },
    { seed: 22,  cat: "city",     label: "Night Skyline",  h: 220 },
    { seed: 31,  cat: "people",   label: "Street Life",    h: 300 },
    { seed: 45,  cat: "abstract", label: "Fluid Forms",    h: 240 },
    { seed: 53,  cat: "nature",   label: "Golden Hour",    h: 260 },
    { seed: 64,  cat: "city",     label: "Urban Grid",     h: 310 },
    { seed: 72,  cat: "people",   label: "Quiet Moment",   h: 250 },
    { seed: 88,  cat: "abstract", label: "Chromatic",      h: 290 },
    { seed: 95,  cat: "nature",   label: "Autumn Trail",   h: 230 },
    { seed: 107, cat: "city",     label: "Neon District",  h: 270 },
    { seed: 115, cat: "people",   label: "Crowd Motion",   h: 200 },
    { seed: 128, cat: "abstract", label: "Prism Light",    h: 320 },
    { seed: 140, cat: "nature",   label: "Coastal Cliffs", h: 250 },
    { seed: 155, cat: "city",     label: "Morning Rush",   h: 240 },
    { seed: 162, cat: "people",   label: "Marketplace",    h: 270 },
    { seed: 178, cat: "abstract", label: "Depth Field",    h: 210 },
  ];

  let visible = [], current = 0;
  let activeCat = 'all', searchQ = '';

  function getVisible() {
    return data.filter(d =>
      (activeCat === 'all' || d.cat === activeCat) &&
      (searchQ === '' || d.label.toLowerCase().includes(searchQ))
    );
  }

  function buildGallery() {
    visible = getVisible();
    const grid = document.getElementById('gallery');
    const empty = document.getElementById('empty');
    const countBar = document.getElementById('countBar');

    grid.innerHTML = '';
    countBar.textContent = visible.length
      ? `${visible.length} image${visible.length !== 1 ? 's' : ''}`
      : '';

    if (!visible.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    visible.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.style.animationDelay = `${i * 40}ms`;
      div.innerHTML = `
        <img src="https://picsum.photos/seed/${item.seed}/400/${item.h}" alt="${item.label}" loading="lazy"/>
        <div class="overlay">
          <div class="cat-badge">${item.cat}</div>
          <div class="icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </div>
          <span class="label">${item.label}</span>
        </div>`;
      div.addEventListener('click', () => openLB(i));
      grid.appendChild(div);
    });
  }

  // ─── FILTER ───
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    buildGallery();
  });

  // ─── SEARCH ───
  document.getElementById('search').addEventListener('input', e => {
    searchQ = e.target.value.trim().toLowerCase();
    buildGallery();
  });

  // ─── LIGHTBOX ───
  function buildDots() {
    const wrap = document.getElementById('lb-progress');
    wrap.innerHTML = '';
    const max = Math.min(visible.length, 12);
    for (let i = 0; i < max; i++) {
      const d = document.createElement('span');
      d.className = 'lb-dot' + (i === current ? ' cur' : '');
      d.addEventListener('click', () => { current = i; updateLB(); });
      wrap.appendChild(d);
    }
    if (visible.length > 12) {
      const more = document.createElement('span');
      more.style.cssText = 'font-size:0.65rem;color:var(--muted);margin-left:4px';
      more.textContent = `+${visible.length - 12}`;
      wrap.appendChild(more);
    }
  }

  function openLB(i) {
    current = i;
    updateLB();
    buildDots();
    document.getElementById('lightbox').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeLB() {
    document.getElementById('lightbox').classList.remove('show');
    document.body.style.overflow = '';
  }

  function navigate(dir) {
    current = (current + dir + visible.length) % visible.length;
    const img = document.getElementById('lb-img');
    img.classList.add('fade');
    setTimeout(() => { updateLB(); img.classList.remove('fade'); }, 220);
    document.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('cur', i === current));
  }

  function updateLB() {
    const item = visible[current];
    document.getElementById('lb-img').src = `https://picsum.photos/seed/${item.seed}/1200/800`;
    document.getElementById('lb-img').alt = item.label;
    document.getElementById('lb-caption').textContent = item.label;
    document.getElementById('lb-counter').textContent = `${current + 1} of ${visible.length}`;
  }

  document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('lb-next').addEventListener('click', () => navigate(1));
  document.getElementById('lb-close').addEventListener('click', closeLB);

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target.id === 'lightbox') closeLB();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('show')) return;
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'Escape')     closeLB();
  });

  // ─── TOUCH SWIPE ───
  let touchStartX = 0;
  document.getElementById('lightbox').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.getElementById('lightbox').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
  });

  buildGallery();
</script>
</body>
</html>
